      function setLang(lang) {
        document.documentElement.setAttribute('data-lang', lang);
        document.documentElement.setAttribute('lang', lang === 'en' ? 'en' : 'zh');
        document.querySelectorAll('.lang-btn').forEach(function(btn) {
          btn.classList.toggle('active', btn.dataset.lang === lang);
        });
        // Swap titles
        document.querySelectorAll('[data-zh]').forEach(function(el) {
          el.textContent = lang === 'en' ? (el.dataset.en || el.dataset.zh) : el.dataset.zh;
        });
        // Swap excerpts on index page
        document.querySelectorAll('[data-zh-excerpt]').forEach(function(el) {
          el.textContent = lang === 'en' ? (el.dataset.enExcerpt || el.dataset.zhExcerpt) : el.dataset.zhExcerpt;
        });
        // Swap content on detail pages
        var zhContent = document.querySelector('.content-zh');
        var enContent = document.querySelector('.content-en');
        if (zhContent && enContent) {
          zhContent.style.display = lang === 'en' ? 'none' : '';
          enContent.style.display = lang === 'en' ? '' : 'none';
        }
        localStorage.setItem('axiom-lang', lang);
      }

      document.querySelectorAll('.lang-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          setLang(btn.dataset.lang);
        });
      });

      if (saved && saved !== 'zh') setLang(saved);
